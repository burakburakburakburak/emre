<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>English Boost</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#E8A020;--ord:#B87A10;--orl:#F0C050;--orp:#2a1e00;
  --bl:#1A73E8;--blp:#0a1a2a;
  --gn:#16A34A;--gnp:#0a1a0a;
  --rd:#DC2626;--rdp:#1a0a0a;
  --pu:#7C3AED;--pup:#1a0a2a;
  --am:#D97706;
  --bg:#0d0d0d;--s1:#181818;--s2:#222;--s3:#2c2c2c;
  --br:#2e2e2e;--br2:#404040;
  --tx:#f0f0f0;--t2:#c0c0c0;--t3:#888;
  --r:12px;--rl:18px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif}
#app{display:flex;height:100vh;overflow:hidden}
#sb-toggle{position:fixed;top:12px;left:12px;z-index:999;width:36px;height:36px;background:var(--or);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#000;transition:left 0.25s ease;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
#sb{width:250px;min-width:250px;background:var(--s1);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden;transition:width 0.25s,min-width 0.25s}
#sb.collapsed{width:0;min-width:0}
.sb-logo{padding:16px 14px 10px;border-bottom:1px solid var(--br)}
.sb-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--or);letter-spacing:2px}
.sb-sub{font-size:10px;color:var(--t3);margin-top:1px}
.sb-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:8px 10px;border-bottom:1px solid var(--br)}
.ss{background:var(--s2);border-radius:7px;padding:6px 3px;text-align:center}
.ss .v{font-size:15px;font-weight:900;color:var(--or)}
.ss .l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
#sb-nav{flex:1;overflow-y:auto;padding:5px}
.sb-sec{font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;padding:9px 7px 3px}
.si{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:1px;position:relative;transition:all .12s}
.si:hover{background:var(--s2);color:var(--tx)}
.si.act{background:var(--or);color:#000}
.si.locked{opacity:.3;cursor:not-allowed;pointer-events:none}
.si .ic{font-size:13px;width:17px;text-align:center}
.si .lb{flex:1}
.si .bk{background:var(--s3);color:var(--t3);font-size:9px;font-weight:800;border-radius:999px;padding:1px 5px}
.si.act .bk{background:rgba(0,0,0,.2);color:#000}
.si-prog{height:3px;background:var(--s3);overflow:hidden;border-radius:2px;position:absolute;bottom:0;left:0;right:0}
.si-pf{height:100%;background:var(--or);border-radius:2px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.scr{display:none;flex:1;flex-direction:column;overflow-y:auto}
.scr.act{display:flex}
#s-home{background:var(--bg)}
.hi{max-width:860px;margin:0 auto;width:100%;padding:22px 18px}
.hdr{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:22px;margin-bottom:18px;position:relative;overflow:hidden}
.hdr::after{content:'\1F1EC\1F1E7';position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:60px;opacity:.15}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--or);letter-spacing:3px;line-height:1}
.hdr p{font-size:13px;color:var(--t2);margin-top:5px}
.op-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin:10px 0 4px}
.op-bar{height:7px;background:var(--s3);border-radius:999px;overflow:hidden}
.op-f{height:100%;background:var(--or);border-radius:999px;transition:width .5s}
.go-btn{background:var(--or);color:#000;border:none;border-radius:9px;padding:10px 22px;font-size:14px;font-weight:800;cursor:pointer;margin-top:12px;font-family:'Nunito',sans-serif}
.go-btn:hover{background:var(--ord)}
.ps{margin-bottom:20px}
.ps-title{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.ps-title::after{content:'';flex:1;height:1px;background:var(--br)}
.pnodes{display:flex;flex-wrap:wrap;gap:9px}
.pn{width:128px;background:var(--s1);border:2px solid var(--br);border-radius:13px;padding:12px 9px;cursor:pointer;text-align:center;position:relative;transition:all .15s}
.pn:hover:not(.locked){border-color:var(--or);background:var(--s2);transform:translateY(-2px)}
.pn.nxt{border-color:var(--or);box-shadow:0 0 0 3px rgba(232,160,32,.2)}
.pn.done{border-color:var(--gn)}
.pn.locked{opacity:.35;cursor:not-allowed}
.pn-ic{font-size:22px;margin-bottom:4px}
.pn-t{font-size:11px;font-weight:800;line-height:1.2}
.pn-s{font-size:9px;color:var(--t3);margin-top:2px}
.pn-bar{height:3px;background:var(--s3);border-radius:2px;margin-top:6px;overflow:hidden}
.pn-f{height:100%;background:var(--or);border-radius:2px}
.pn.done .pn-f{background:var(--gn)}
.pn-ck{position:absolute;top:5px;right:5px;font-size:11px}
#s-vocab{background:var(--bg)}
.vi{max-width:960px;margin:0 auto;width:100%;padding:22px 18px}
.pg-t{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--or);letter-spacing:2px;margin-bottom:12px}
.vctrls{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap}
.vsrch{background:var(--s2);border:1px solid var(--br);border-radius:7px;padding:6px 11px;font-size:13px;color:var(--tx);outline:none;font-family:'Nunito',sans-serif;flex:1;min-width:170px}
.vsrch:focus{border-color:var(--or)}
.vtag{background:var(--s2);border:1px solid var(--br);border-radius:7px;padding:6px 11px;font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .12s}
.vtag.on,.vtag:hover{background:var(--or);color:#000;border-color:var(--or)}
.vtbl{width:100%;border-collapse:collapse}
.vtbl th{text-align:left;font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;padding:6px 9px;border-bottom:1px solid var(--br)}
.vtbl td{padding:7px 9px;border-bottom:1px solid var(--br);font-size:13px}
.vtbl tr:hover td{background:var(--s1)}
.vtp{display:inline-block;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700}
.vtp.basketball{background:#0d1f33;color:#60a5fa}
.vtp.police{background:#1a1a0d;color:#facc15}
.vtp.got{background:#1a0d0d;color:#f87171}
.vtp.lotr{background:#0d1a0d;color:#4ade80}
.vtp.religion{background:#1a0d1a;color:#c084fc}
.vtp.common{background:#0d1a1a;color:#67e8f9}
#s-lesson{background:var(--bg)}
.ltb{display:flex;align-items:center;gap:9px;padding:11px 16px;background:var(--s1);border-bottom:1px solid var(--br);flex-shrink:0}
.ltb-x{background:none;border:1px solid var(--br);border-radius:6px;padding:4px 9px;color:var(--t2);cursor:pointer;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif}
.ltb-x:hover{background:var(--s2)}
.ltb-u{font-size:11px;font-weight:800;color:var(--or);white-space:nowrap}
.ltb-ph{font-size:9px;color:var(--t3)}
.ltb-pw{flex:1;height:6px;background:var(--s2);border-radius:999px;overflow:hidden}
.ltb-p{height:100%;background:var(--or);border-radius:999px;transition:width .4s}
.ltb-hh{display:flex;gap:3px}
.hrt{font-size:15px;transition:all .2s}
.hrt.lost{transform:scale(.6);filter:grayscale(1);opacity:.35}
.lb{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.exw{width:100%;max-width:610px}
.exc{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:22px;animation:su .22s ease}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.exlbl{font-size:10px;font-weight:800;color:var(--or);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.exq{font-size:20px;font-weight:900;line-height:1.3;margin-bottom:4px}
.exs{font-size:13px;color:var(--t2);margin-bottom:12px}
.ibox{background:var(--s2);border-radius:13px;padding:22px;text-align:center;margin-bottom:11px}
.iit{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--or);letter-spacing:2px;line-height:1}
.itr{font-size:17px;color:var(--t2);margin-top:4px}
.iex{font-size:12px;color:var(--t3);margin-top:7px;padding-top:7px;border-top:1px solid var(--br);font-style:italic}
.lbtn{display:inline-flex;align-items:center;gap:5px;background:var(--blp);color:#60a5fa;border:1px solid #1e4a8a;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:12px;font-family:'Nunito',sans-serif}
.lbtn:hover{background:#0d2040}
.dir-badge{display:inline-block;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:800;margin-bottom:10px}
.dir-badge.en{background:#0d1f33;color:#60a5fa}
.dir-badge.tr{background:#1a0d1f;color:#c084fc}
.lfw{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:14px 0}
.lfch{width:34px;height:38px;border-bottom:2px solid var(--or);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900}
.lfbl{width:34px;height:38px;border-bottom:2px solid var(--or);display:flex;align-items:center;justify-content:center}
.lfi{width:34px;height:38px;background:transparent;border:none;outline:none;text-align:center;font-size:19px;font-weight:900;color:var(--or);font-family:'Nunito',sans-serif;text-transform:lowercase;padding:0}
.lfi.ok{color:var(--gn)}
.lfi.bad{color:var(--rd)}
.lfhint{text-align:center;font-size:13px;color:var(--t3);margin-bottom:10px}
.choices{display:flex;flex-direction:column;gap:8px}
.chbtn{background:var(--s2);border:1.5px solid var(--br2);border-radius:10px;padding:12px 15px;font-size:14px;font-weight:700;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;color:var(--tx);transition:all .13s}
.chbtn:hover:not(:disabled){border-color:var(--or);background:var(--orp)}
.chbtn.correct{border-color:var(--gn)!important;background:var(--gnp)!important;color:#4ade80!important}
.chbtn.wrong{border-color:var(--rd)!important;background:var(--rdp)!important;color:#f87171!important}
.trow{display:flex;gap:8px;margin-top:4px}
.tinp{flex:1;background:var(--s2);border:1.5px solid var(--br2);border-radius:10px;padding:11px 15px;font-size:17px;font-weight:700;color:var(--tx);outline:none;font-family:'Nunito',sans-serif;transition:border-color .13s}
.tinp:focus{border-color:var(--or)}
.tinp.correct{border-color:var(--gn)!important;background:var(--gnp)!important}
.tinp.wrong{border-color:var(--rd)!important;background:var(--rdp)!important}
.ckbtn{background:var(--or);color:#000;border:none;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap}
.ckbtn:hover{background:var(--ord)}
.sent{font-size:18px;font-weight:700;line-height:2.2;margin-bottom:9px}
.blanki{display:inline-block;min-width:80px;border:none;border-bottom:2.5px solid var(--or);background:transparent;color:var(--tx);font-size:17px;font-weight:700;font-family:'Nunito',sans-serif;outline:none;text-align:center;padding:0 3px}
.blanki.correct{border-bottom-color:var(--gn);color:#4ade80}
.blanki.wrong{border-bottom-color:var(--rd);color:#f87171}
.wbank{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.wchip{background:var(--s2);border:1.5px solid var(--br2);border-radius:7px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s;user-select:none}
.wchip:hover{border-color:var(--or);background:var(--orp)}
.wchip.used{opacity:.2;pointer-events:none}
.bzone{display:flex;flex-wrap:wrap;gap:6px;min-height:42px;background:var(--s2);border:1.5px dashed var(--br2);border-radius:10px;padding:9px;margin-bottom:9px;align-items:center}
.bchip{background:var(--or);color:#000;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer}
.bchip:hover{background:var(--ord)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mcol{display:flex;flex-direction:column;gap:6px}
.mi{background:var(--s2);border:1.5px solid var(--br2);border-radius:10px;padding:11px 13px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s;line-height:1.3}
.mi:hover:not(.matched){border-color:var(--or)}
.mi.sel{border-color:var(--or);background:var(--orp);color:var(--or)}
.mi.matched{border-color:var(--gn);background:var(--gnp);color:#4ade80;pointer-events:none}
.mi.fw{border-color:var(--rd);background:var(--rdp);animation:shk .3s}
@keyframes shk{0%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}100%{transform:translateX(0)}}
.wfg{display:inline-grid;gap:2px;border:1px solid var(--br);border-radius:7px;padding:7px;background:var(--s2)}
.wfc{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border-radius:4px;cursor:pointer;user-select:none;color:var(--tx);background:var(--s1);transition:background .08s}
.wfc:hover{background:var(--s3)}
.wfc.sel{background:var(--or);color:#000}
.wfc.found{background:var(--gn);color:#fff;cursor:default}
.wfts{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.wft{font-size:11px;font-weight:800;padding:3px 9px;border-radius:4px;background:var(--s2);color:var(--t3)}
.wft.found{background:var(--gnp);color:#4ade80;text-decoration:line-through}
.fb{display:none;border-radius:10px;padding:11px 15px;margin-top:11px;font-weight:800;font-size:13px;align-items:center;gap:7px}
.fb.show{display:flex;animation:su .18s}
.fb.ok{background:var(--gnp);border:1.5px solid var(--gn);color:#4ade80}
.fb.fail{background:var(--rdp);border:1.5px solid var(--rd);color:#f87171}
.cbtn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--or);color:#000;font-size:15px;font-weight:900;cursor:pointer;margin-top:11px;font-family:'Nunito',sans-serif;display:none;transition:all .13s}
.cbtn.show{display:block;animation:su .18s}
.cbtn:hover{background:var(--ord)}
#s-go{background:var(--bg);align-items:center;justify-content:center}
.go-card{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:26px;max-width:470px;width:100%;text-align:center}
.go-ic{font-size:50px;margin-bottom:9px}
.go-ttl{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--rd);letter-spacing:2px}
.go-sub{font-size:13px;color:var(--t2);margin:4px 0 16px}
.mlist{text-align:left;border:1px solid var(--br);border-radius:9px;overflow:hidden;margin-bottom:16px}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:8px 13px;border-bottom:1px solid var(--br);font-size:13px}
.mrow:last-child{border-bottom:none}
.mit{color:var(--or);font-weight:800}
.go-btns{display:flex;gap:9px}
.go-b{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .13s}
.go-b.retry{background:var(--or);color:#000}
.go-b.retry:hover{background:var(--ord)}
.go-b.home{background:var(--s2);color:var(--tx);border:1px solid var(--br)}
.go-b.home:hover{background:var(--s3)}
#s-cp{background:var(--bg);align-items:center;justify-content:center}
.cp-card{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:28px;max-width:490px;width:100%;text-align:center}
.cp-tr{font-size:52px;animation:pi .5s cubic-bezier(.17,.67,.33,1.3)}
@keyframes pi{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.cp-ttl{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--or);letter-spacing:2px;margin-top:9px}
.cp-stats{display:flex;gap:9px;justify-content:center;margin:14px 0}
.cps{background:var(--s2);border-radius:9px;padding:11px 14px}
.cps .v{font-size:22px;font-weight:900;color:var(--or)}
.cps .l{font-size:9px;color:var(--t3);text-transform:uppercase}
.cp-voc{text-align:left;border-top:1px solid var(--br);padding-top:11px;margin-top:7px;max-height:190px;overflow-y:auto}
.cp-vh{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;margin-bottom:6px}
.cp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;border-bottom:1px solid var(--br)}
.cp-en{color:var(--or);font-weight:800}
.cp-btns{display:flex;gap:9px;margin-top:16px}
.cp-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .13s}
.cp-btn.home{background:var(--s2);color:var(--tx);border:1px solid var(--br)}
.cp-btn.home:hover{background:var(--s3)}
.cp-btn.next{background:var(--or);color:#000}
.cp-btn.next:hover{background:var(--ord)}
.rvbdg{display:inline-block;background:var(--pup);border:1px solid var(--pu);color:#c084fc;font-size:10px;font-weight:800;border-radius:999px;padding:1px 7px;margin-left:5px;text-transform:uppercase}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
</style>
</head>
<body>
<button id="sb-toggle" onclick="toggleSB()" title="Toggle menu">&#9776;</button>
<div id="app">
  <div id="sb">
    <div class="sb-logo">
      <div class="sb-title">&#127468;&#127463; ENGLISH BOOST</div>
      <div class="sb-sub">Learn English in Turkish</div>
    </div>
    <div class="sb-stats">
      <div class="ss"><div class="v" id="sb-xp">0</div><div class="l">XP</div></div>
      <div class="ss"><div class="v" id="sb-str">0</div><div class="l">Streak</div></div>
      <div class="ss"><div class="v" id="sb-wds">0</div><div class="l">Words</div></div>
    </div>
    <div id="sb-nav"></div>
  </div>
  <div id="main">
    <div class="scr" id="s-home"></div>
    <div class="scr" id="s-vocab"></div>
    <div class="scr" id="s-lesson">
      <div class="ltb" id="ltb"></div>
      <div class="lb"><div class="exw" id="ex-area"></div></div>
    </div>
    <div class="scr" id="s-go"></div>
    <div class="scr" id="s-cp"></div>
  </div>

function speak(word){
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.05;
  speechSynthesis.speak(u);
}

}

  document.getElementById('sb-xp').textContent  = S.xp;

  var nav = document.getElementById('sb-nav');

    {label:'&#128110; Police',     tag:'police'},

    {label:'&#128141; Lord of the Rings', tag:'lotr'},
    {label:'&#128591; Religion',   tag:'religion'},

  return '<div class="si'+(active?' act':'')+'" onclick="'+fn+'">'
    +'<span class="ic">'+ic+'</span><span class="lb">'+lbl+'</span></div>';
}
function sbUnit(u){
  var idx = UNITS.findIndex(function(x){return x.id===u.id;});
  var done   = S.done.indexOf(u.id)!==-1;
  var locked = idx>0 && S.done.indexOf(UNITS[idx-1].id)===-1;
  var p      = S.prog[u.id]||0;
  return '<div class="si'+(done?' done':'')+(locked?' locked':'')+'" onclick="'+(locked?'':'startLesson('+JSON.stringify(u.id)+')')+'">'
    +'<span class="ic">'+(done?'&#9989;':u.icon)+'</span>'
    +'<span class="lb">'+u.label+'</span>'
    +'<span class="bk">'+u.w.length+'</span>'
    +(!locked&&!done?'<div class="si-prog"><div class="si-pf" style="width:'+p+'%"></div></div>':'')
    +'</div>';
}

function renderVTable(){

function startLesson(uid){
  var unit=null;
  for(var i=0;i<UNITS.length;i++){if(UNITS[i].id===uid){unit=UNITS[i];break;}}
  if(!unit) return;
  L={unit:unit,uid:uid,exs:buildExs(unit),idx:0,hearts:3,xp:0,correct:0,mistakes:[],answered:false};
  showScr('lesson');
  renderTopbar();
  renderEx();
}

function getPrev(unit){
  var idx=UNITS.findIndex(function(u){return u.id===unit.id;});
  var out=[];
  for(var i=0;i<idx;i++){if(S.done.indexOf(UNITS[i].id)!==-1)out=out.concat(UNITS[i].w);}
  return out;
}

function mkW(arr){return {en:arr[0],tr:arr[1],ex:arr[2]};}

function buildExs(unit){
  var W = unit.w.map(mkW);
  var exs=[];
  W.forEach(function(w){exs.push({type:'intro',w:w,phase:1});});
  shuf(W.slice()).forEach(function(w){
    exs.push({type:'lf',  w:w,phase:2});
    exs.push({type:'mc',  w:w,pool:W,phase:2,dir:Math.random()<0.5?'en2tr':'tr2en'});
  });
  shuf(W.slice()).forEach(function(w){
    exs.push({type:'type',w:w,phase:3,dir:Math.random()<0.5?'en2tr':'tr2en'});
  });
  chunk(shuf(W.slice()),4).forEach(function(g){if(g.length>=3)exs.push({type:'match',words:g,phase:3});});
  SENTS.sort(function(){return Math.random()-.5;}).slice(0,3).forEach(function(s){
    exs.push({type:'fill',sent:s,phase:4});
  });
  shuf(W.slice()).slice(0,3).forEach(function(w){exs.push({type:'build',w:w,phase:4});});
  exs.push({type:'wf',words:W.slice(0,6),phase:5});
  var prev=getPrev(unit).map(mkW);
  if(prev.length>=2){
    shuf(prev.slice()).slice(0,3).forEach(function(w){
      exs.push({type:'mc',w:w,pool:prev.slice(0,8).concat(W.slice(0,4)).map(function(x){return typeof x.en==='undefined'?mkW(x):x;}),phase:6,review:true,dir:Math.random()<0.5?'en2tr':'tr2en'});
    });
  }
  var out=[];
  for(var p=1;p<=6;p++) exs.filter(function(e){return e.phase===p;}).forEach(function(e){out.push(e);});
  return out.slice(0,30);
}

function shuf(a){return a.sort(function(){return Math.random()-.5;});}
function chunk(a,n){var r=[];for(var i=0;i<a.length;i+=n)r.push(a.slice(i,i+n));return r;}
function lev(a,b){
  var m=a.length,n=b.length,d=[];
  for(var i=0;i<=m;i++){d[i]=[];for(var j=0;j<=n;j++)d[i][j]=i?j?0:i:j;}
  for(var i=1;i<=m;i++)for(var j=1;j<=n;j++)d[i][j]=a[i-1]===b[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);
  return d[m][n];
}

function renderTopbar(){
  if(!L) return;
  var pct=Math.round(L.idx/L.exs.length*100);
  var ex=L.exs[L.idx];
  var phN=['','&#128218; Learn','&#128269; Recognize','&#9997; Recall','&#128221; Sentences','&#128270; Word Find','&#128260; Review'];
  var ph=ex?ex.phase:6;
  var hh='';
  for(var i=0;i<3;i++) hh+='<span class="hrt'+(i>=L.hearts?' lost':'')+'">❤️</span>';
  document.getElementById('ltb').innerHTML=
    '<button class="ltb-x" id="ltb-exit">&#10005;</button>'
    +'<div><div class="ltb-u">'+L.unit.label+'</div><div class="ltb-ph">'+(phN[ph]||'')+'</div></div>'
    +'<div class="ltb-pw"><div class="ltb-p" style="width:'+pct+'%"></div></div>'
    +'<div class="ltb-hh">'+hh+'</div>';
  document.getElementById('ltb-exit').addEventListener('click',function(){
    if(confirm('Exit lesson? Progress will be lost.')) showHome();
  });
}

function renderEx(){
  if(!L) return;
  if(L.idx>=L.exs.length){showComplete();return;}
  var ex=L.exs[L.idx];
  L.answered=false;
  renderTopbar();
  S.prog[L.uid]=Math.round(L.idx/L.exs.length*100);
  saveS(); refreshSB('lesson');
  var area=document.getElementById('ex-area');
  area.innerHTML='';
  var fns={intro:renderIntro,lf:renderLF,mc:renderMC,type:renderType,match:renderMatch,fill:renderFill,build:renderBuild,wf:renderWF};
  if(fns[ex.type]) fns[ex.type](ex,area); else advance();
}

function showFB(ok,msg){
  var fb=document.getElementById('fb');if(!fb)return;
  fb.className='fb show '+(ok?'ok':'fail');
  fb.innerHTML=(ok?'&#9989; ':'&#10060; ')+msg;
}
function showCont(area){var b=area.querySelector('.cbtn');if(b)b.classList.add('show');}
function advance(){L.idx++;renderEx();}
function loseHeart(w){
  L.hearts=Math.max(0,L.hearts-1);
  if(w&&!L.mistakes.some(function(m){return m.en===w.en;})) L.mistakes.push(w);
  renderTopbar();
  if(L.hearts<=0) setTimeout(showGO,600);
}

function renderIntro(ex,area){
  var w=ex.w;
  area.innerHTML='<div class="exc">'
    +'<div class="exlbl">&#128218; New Word</div>'
    +'<div class="ibox">'
    +'<div class="iit">'+w.en+'</div>'
    +'<div class="itr">'+w.tr+'</div>'
    +(w.ex?'<div class="iex">'+w.ex+'</div>':'')
    +'</div>'
    +'<button class="lbtn" id="spk-i">&#128266; Listen</button>'
    +'</div>'
    +'<button class="cbtn show" id="cont-btn">Got it! Continue &#8594;</button>';
  document.getElementById('spk-i').addEventListener('click',function(){speak(w.en);});
  document.getElementById('cont-btn').addEventListener('click',advance);
  speak(w.en);
}

function renderLF(ex,area){
  var w=ex.w;
  var letters=w.en.split('');
  var hide=[];
  letters.forEach(function(ch,i){if(i>0&&ch!==' '&&Math.random()<0.45)hide.push(i);});
  if(!hide.length){var m=Math.floor(letters.length/2);if(letters[m]!==' ')hide.push(m);}
  var H='<div class="exc">'
    +'<div class="exlbl">&#128292; Fill in the Missing Letters</div>'
    +'<div class="lfhint">Turkish: <strong style="color:var(--orl)">'+w.tr+'</strong></div>'
    +'<div class="lfw" id="lfw-wrap">';
  letters.forEach(function(ch,i){
    if(ch===' '){H+='<div style="width:14px"></div>';return;}
    if(hide.indexOf(i)!==-1){
      H+='<div class="lfbl"><input class="lfi" data-idx="'+i+'" data-ans="'+ch.toLowerCase()+'" maxlength="1" autocomplete="off" autocorrect="off" spellcheck="false"></div>';
    } else {
      H+='<div class="lfch">'+ch+'</div>';
    }
  });
  H+='</div><button class="lbtn" id="spk-lf">&#128266; Hear it</button>'
    +'<div class="fb" id="fb"></div></div>'
    +'<button class="cbtn" id="cont-btn">Continue &#8594;</button>';
  area.innerHTML=H;
  document.getElementById('spk-lf').addEventListener('click',function(){speak(w.en);});
  document.getElementById('cont-btn').addEventListener('click',advance);
  var inputs=area.querySelectorAll('.lfi');
  inputs.forEach(function(inp){
    inp.addEventListener('input',function(){
      var val=inp.value.toLowerCase();
      var ans=inp.dataset.ans.toLowerCase();
      if(val===ans){
        inp.classList.add('ok');
        var all=Array.prototype.slice.call(area.querySelectorAll('.lfi'));
        var ci=all.indexOf(inp);
        if(ci<all.length-1) all[ci+1].focus();
        var done=all.every(function(x){return x.value.toLowerCase()===x.dataset.ans.toLowerCase();});
        if(done&&!L.answered){L.answered=true;L.xp+=10;L.correct++;showFB(true,'Perfect! +10 XP');showCont(area);speak(w.en);}
      } else if(val){
        inp.classList.add('bad');
        setTimeout(function(){inp.classList.remove('bad');inp.value='';},300);
      }
    });
  });
  if(inputs.length) setTimeout(function(){inputs[0].focus();},60);
}

function renderMC(ex,area){
  var w=ex.w;
  var dir=ex.dir||'en2tr';
  var qText=dir==='en2tr'?w.en:w.tr;
  var correct=dir==='en2tr'?w.tr:w.en;
  var pool=(ex.pool||[]).filter(function(p){return (dir==='en2tr'?p.tr:p.en)!==correct;});
  var dist=shuf(pool.slice()).slice(0,3).map(function(p){return dir==='en2tr'?p.tr:p.en;});
  while(dist.length<3) dist.push(['to go','red','fast','small'][dist.length]||'other');
  var choices=shuf([correct].concat(dist.slice(0,3)));
  var label=dir==='en2tr'?'Translate to Turkish':'Translate to English';
  var badge=dir==='en2tr'?'<span class="dir-badge en">EN &#8594; TR</span>':'<span class="dir-badge tr">TR &#8594; EN</span>';
  var H='<div class="exc">'
    +'<div class="exlbl">&#128269; '+label+(ex.review?'<span class="rvbdg">review</span>':'')+'</div>'
    +badge
    +'<div class="exq">'+qText+'</div>'
    +(dir==='en2tr'?'<button class="lbtn" id="spk-mc">&#128266; Listen</button>':'')
    +'<div class="choices" id="ch-wrap">';
  choices.forEach(function(c){H+='<button class="chbtn" data-val="'+c+'">'+c+'</button>';});
  H+='</div><div class="fb" id="fb"></div></div><button class="cbtn" id="cont-btn">Continue &#8594;</button>';
  area.innerHTML=H;
  var spkBtn=document.getElementById('spk-mc');
  if(spkBtn) spkBtn.addEventListener('click',function(){speak(w.en);});
  document.getElementById('cont-btn').addEventListener('click',advance);
  area.querySelectorAll('.chbtn').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(L.answered) return;
      L.answered=true;
      area.querySelectorAll('.chbtn').forEach(function(b){b.disabled=true;});
      if(btn.dataset.val===correct){
        btn.classList.add('correct');
        showFB(true,'Correct! +10 XP');L.xp+=10;L.correct++;
      } else {
        btn.classList.add('wrong');
        area.querySelectorAll('.chbtn').forEach(function(b){if(b.dataset.val===correct)b.classList.add('correct');});
        showFB(false,'Answer: '+correct);
        loseHeart(w);
      }
      showCont(area);
    });
  });
}

function renderType(ex,area){
  var w=ex.w;
  var dir=ex.dir||'en2tr';
  var qText=dir==='en2tr'?'What is the Turkish for: ':'What is the English for: ';
  var shown=dir==='en2tr'?w.en:w.tr;
  var correct=dir==='en2tr'?w.tr:w.en;
  var badge=dir==='en2tr'?'<span class="dir-badge en">EN &#8594; TR</span>':'<span class="dir-badge tr">TR &#8594; EN</span>';
  area.innerHTML='<div class="exc">'
    +'<div class="exlbl">&#9997; Type the Answer'+(ex.review?'<span class="rvbdg">review</span>':'')+'</div>'
    +badge
    +'<div class="exq">'+qText+'<span style="color:var(--orl)">'+shown+'</span> ?</div>'
    +(dir==='en2tr'?'<button class="lbtn" id="spk-ty">&#128266; Hear it</button>':'')
    +'<div class="trow"><input class="tinp" id="ty-inp" placeholder="Type your answer..." autocomplete="off" autocorrect="off" spellcheck="false">'
    +'<button class="ckbtn" id="ty-ck">Check</button></div>'
    +'<div class="fb" id="fb"></div></div>'
    +'<button class="cbtn" id="cont-btn">Continue &#8594;</button>';
  var spkBtn=document.getElementById('spk-ty');
  if(spkBtn) spkBtn.addEventListener('click',function(){speak(w.en);});
  document.getElementById('cont-btn').addEventListener('click',advance);
  var inp=document.getElementById('ty-inp');
  function check(){
    if(L.answered||!inp.value.trim()) return;
    L.answered=true; inp.disabled=true;
    var val=inp.value.trim().toLowerCase();
    var cor=correct.toLowerCase();
    var ok=val===cor||lev(val,cor)<=2;
    inp.classList.add(ok?'correct':'wrong');
    if(ok){showFB(true,'Perfect! +12 XP');L.xp+=12;L.correct++;if(dir==='en2tr')speak(w.en);}
    else{showFB(false,'Answer: '+correct);loseHeart(w);}
    showCont(area);
  }
  document.getElementById('ty-ck').addEventListener('click',check);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')check();});
  setTimeout(function(){inp.focus();},80);
}

function renderFill(ex,area){
  var s=ex.sent;
  var parts=s.en.split('___');
  var sentH='';
  parts.forEach(function(p,i){
    sentH+=p;
    if(i<parts.length-1){
      sentH+='<input class="blanki" data-idx="'+i+'" style="min-width:'+Math.max(70,(s.blank||'').length*13)+'px" autocomplete="off" autocorrect="off" spellcheck="false">';
    }
  });
  area.innerHTML='<div class="exc">'
    +'<div class="exlbl">&#128221; Fill in the Blank</div>'
    +'<div class="exs">&#127481;&#127479; '+s.tr+'</div>'
    +'<div class="sent">'+sentH+'</div>'
    +'<button class="ckbtn" id="fill-ck" style="width:100%;margin-top:8px">Check</button>'
    +'<div class="fb" id="fb"></div></div>'
    +'<button class="cbtn" id="cont-btn">Continue &#8594;</button>';
  document.getElementById('cont-btn').addEventListener('click',advance);
  document.getElementById('fill-ck').addEventListener('click',function(){
    if(L.answered) return;
    var inp=area.querySelector('.blanki');
    if(!inp) return;
    inp.disabled=true;
    var ok=inp.value.trim().toLowerCase()===(s.blank||'').toLowerCase()||lev(inp.value.trim().toLowerCase(),(s.blank||'').toLowerCase())<=1;
    inp.classList.add(ok?'correct':'wrong');
    L.answered=true;
    if(ok){showFB(true,'Excellent! +15 XP');L.xp+=15;L.correct++;}
    else{showFB(false,'Answer: '+s.blank);loseHeart(null);}
    showCont(area);
  });
  var bi=area.querySelector('.blanki');
  if(bi){
    bi.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('fill-ck').click();});
    setTimeout(function(){bi.focus();},80);
  }
}

var _built=[];
function renderBuild(ex,area){
  var w=ex.w;
  var sentence='I need '+w.en+' to win';
  var tokens=shuf(sentence.split(' '));
  _built=[];
  var chips='';
  tokens.forEach(function(tok,i){
    chips+='<div class="wchip" data-idx="'+i+'" data-word="'+tok+'">'+tok+'</div>';
  });
  area.innerHTML='<div class="exc">'
    +'<div class="exlbl">&#128221; Build the Sentence</div>'
    +'<div class="exs">&#127481;&#127479; Kazanmak için '+w.tr+' gerekiyor</div>'
    +'<div class="bzone" id="bzone"></div>'
    +'<div class="wbank" id="wbank">'+chips+'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="ckbtn" id="bd-ck" style="flex:1">Check</button>'
    +'<button class="ckbtn" id="bd-cl" style="background:var(--s3);border:1px solid var(--br);color:var(--t2)">Clear</button>'
    +'</div><div class="fb" id="fb"></div></div>'
    +'<button class="cbtn" id="cont-btn">Continue &#8594;</button>';
  document.getElementById('cont-btn').addEventListener('click',advance);
  area.querySelectorAll('.wchip').forEach(function(chip){
    chip.addEventListener('click',function(){
      if(chip.classList.contains('used')) return;
      chip.classList.add('used');
      _built.push({idx:parseInt(chip.dataset.idx),word:chip.dataset.word});
      var el=document.createElement('div');el.className='bchip';el.textContent=chip.dataset.word;
      var cidx=parseInt(chip.dataset.idx);
      el.addEventListener('click',function(){chip.classList.remove('used');_built=_built.filter(function(b){return b.idx!==cidx;});el.remove();});
      document.getElementById('bzone').appendChild(el);
    });
  });
  document.getElementById('bd-cl').addEventListener('click',function(){
    _built=[];
    area.querySelectorAll('.wchip').forEach(function(c){c.classList.remove('used');});
    document.getElementById('bzone').innerHTML='';
  });
  document.getElementById('bd-ck').addEventListener('click',function(){
    if(L.answered) return;
    var built=_built.map(function(b){return b.word;}).join(' ');
    L.answered=true;
    if(built.toLowerCase()===sentence.toLowerCase()){showFB(true,'Perfect! +15 XP');L.xp+=15;L.correct++;}
    else{showFB(false,'Correct: '+sentence);loseHeart(null);}
    showCont(area);
  });
}

var _mSel=null,_mDone=[],_mCount=0,_mTotal=0;
function renderMatch(ex,area){
  var pairs=ex.words.slice(0,4);
  _mSel=null;_mDone=[];_mCount=0;_mTotal=pairs.length;
  var lefts=shuf(pairs.slice());
  var rights=shuf(pairs.slice());
  var lH=lefts.map(function(p){return '<div class="mi" data-side="en" data-en="'+p.en+'" data-tr="'+p.tr+'">'+p.en+'</div>';}).join('');
  var rH=rights.map(function(p){return '<div class="mi" data-side="tr" data-en="'+p.en+'" data-tr="'+p.tr+'">'+p.tr+'</div>';}).join('');
  area.innerHTML='<div class="exc">'
    +'<div class="exlbl">&#128279; Match: English &#8596; Turkish</div>'
    +'<div class="mgrid" style="margin-top:13px">'
    +'<div class="mcol">'+lH+'</div>'
    +'<div class="mcol">'+rH+'</div>'
    +'</div><div class="fb" id="fb"></div></div>'
    +'<button class="cbtn" id="cont-btn">Continue &#8594;</button>';
  document.getElementById('cont-btn').addEventListener('click',advance);
  area.querySelectorAll('.mi').forEach(function(el){
    el.addEventListener('click',function(){
      if(el.classList.contains('matched')) return;
      if(!_mSel){
        area.querySelectorAll('.mi').forEach(function(e){e.classList.remove('sel');});
        el.classList.add('sel');_mSel=el;
      } else {
        var prev=_mSel;
        if(prev===el){el.classList.remove('sel');_mSel=null;return;}
        if(prev.dataset.side===el.dataset.side){
          area.querySelectorAll('.mi').forEach(function(e){e.classList.remove('sel');});
          el.classList.add('sel');_mSel=el;return;
        }
        if(prev.dataset.en===el.dataset.en&&prev.dataset.tr===el.dataset.tr){
          speak(el.dataset.en);
          [prev,el].forEach(function(e){e.classList.remove('sel');e.classList.add('matched');});
          _mCount++;L.xp+=8;
          if(_mCount>=_mTotal){showFB(true,'All matched! +32 XP');L.correct++;showCont(area);L.answered=true;}
        } else {
          [prev,el].forEach(function(e){e.classList.remove('sel');e.classList.add('fw');setTimeout(function(){e.classList.remove('fw');},350);});
          loseHeart(null);
        }
        _mSel=null;
      }
    });
  });
}

var _wfDown=false,_wfSel=[],_wfGrid=[],_wfPlaced=[],_wfFound=[];
function renderWF(ex,area){
  var targets=ex.words.slice(0,5).map(function(w){return w.en.toUpperCase().replace(/[\s\-]/g,'').substring(0,9);});
  var SZ=11;
  _wfGrid=[];for(var r=0;r<SZ;r++){_wfGrid[r]=[];for(var c=0;c<SZ;c++)_wfGrid[r][c]='';}
  _wfPlaced=[];_wfFound=[];_wfSel=[];
  targets.forEach(function(word){
    for(var t=0;t<150;t++){
      var dir=Math.random()<.5?'h':'v';
      var row=Math.floor(Math.random()*(SZ-(dir==='v'?word.length:0)));
      var col=Math.floor(Math.random()*(SZ-(dir==='h'?word.length:0)));
      var ok=true;
      for(var i=0;i<word.length;i++){var rr=dir==='v'?row+i:row,cc=dir==='h'?col+i:col;if(_wfGrid[rr][cc]&&_wfGrid[rr][cc]!==word[i]){ok=false;break;}}
      if(ok){for(var i=0;i<word.length;i++){var rr2=dir==='v'?row+i:row,cc2=dir==='h'?col+i:col;_wfGrid[rr2][cc2]=word[i];}_wfPlaced.push({word:word,r:row,c:col,dir:dir});break;}
    }
  });
  var ABC='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(var r=0;r<SZ;r++) for(var c=0;c<SZ;c++) if(!_wfGrid[r][c]) _wfGrid[r][c]=ABC[Math.floor(Math.random()*26)];
  var cells='';
  for(var r=0;r<SZ;r++) for(var c=0;c<SZ;c++) cells+='<div class="wfc" data-i="'+(r*SZ+c)+'">'+_wfGrid[r][c]+'</div>';
  var tgts=_wfPlaced.map(function(p){return '<div class="wft" id="wft-'+p.word+'">'+p.word.toLowerCase()+'</div>';}).join('');
  area.innerHTML='<div class="exc" style="overflow:auto">'
    +'<div class="exlbl">&#128270; Word Find</div>'
    +'<div class="exs">Find the English words hidden in the grid</div>'
    +'<div style="overflow-x:auto;text-align:center"><div class="wfg" style="grid-template-columns:repeat('+SZ+',30px)" id="wfgrid">'+cells+'</div></div>'
    +'<div class="wfts" id="wfts">'+tgts+'</div>'
    +'<div class="fb" id="fb"></div></div>'
    +'<button class="cbtn" id="cont-btn">Continue &#8594;</button>';
  document.getElementById('cont-btn').addEventListener('click',advance);
  var grid=document.getElementById('wfgrid');
  grid.addEventListener('mousedown',function(e){var cell=e.target.closest('.wfc');if(!cell)return;_wfDown=true;_wfSel=[parseInt(cell.dataset.i)];wfHL();});
  grid.addEventListener('mousemove',function(e){
    if(!_wfDown)return;
    var cell=e.target.closest('.wfc');if(!cell)return;
    var ci=parseInt(cell.dataset.i),si=_wfSel[0];
    var sr=Math.floor(si/SZ),sc2=si%SZ,er=Math.floor(ci/SZ),ec=ci%SZ;
    var c2=[];
    if(sr===er){var mn=Math.min(sc2,ec),mx=Math.max(sc2,ec);for(var cc=mn;cc<=mx;cc++)c2.push(sr*SZ+cc);}
    else if(sc2===ec){var mn=Math.min(sr,er),mx=Math.max(sr,er);for(var rr=mn;rr<=mx;rr++)c2.push(rr*SZ+sc2);}
    else c2=[si];
    _wfSel=c2;wfHL();
  });
  document.addEventListener('mouseup',function onUp(){
    if(!_wfDown)return;_wfDown=false;
    var word=_wfSel.map(function(i){return (_wfGrid[Math.floor(i/SZ)]||[])[i%SZ]||'';}).join('');
    var found=null;
    _wfPlaced.forEach(function(p){
      if(_wfFound.indexOf(p.word)!==-1)return;
      var pc=[];for(var j=0;j<p.word.length;j++){var rr=p.dir==='v'?p.r+j:p.r,cc=p.dir==='h'?p.c+j:p.c;pc.push(rr*SZ+cc);}
      var a=_wfSel.slice().sort(function(x,y){return x-y;}).join(',');
      var b=pc.slice().sort(function(x,y){return x-y;}).join(',');
      if(a===b)found=p;
    });
    if(found){
      var g=document.getElementById('wfgrid');
      if(g)_wfSel.forEach(function(i){var c=g.querySelector('[data-i="'+i+'"]');if(c){c.classList.remove('sel');c.classList.add('found');}});
      _wfFound.push(found.word);
      var tEl=document.getElementById('wft-'+found.word);if(tEl)tEl.classList.add('found');
      L.xp+=10;speak(found.word.toLowerCase());
      if(_wfFound.length>=_wfPlaced.length){showFB(true,'All found! +50 XP');L.xp+=40;L.correct++;var cb=document.getElementById('cont-btn');if(cb)cb.classList.add('show');L.answered=true;}
    } else {
      var g2=document.getElementById('wfgrid');
      if(g2)g2.querySelectorAll('.wfc:not(.found)').forEach(function(c){c.classList.remove('sel');});
    }
    _wfSel=[];
    document.removeEventListener('mouseup',onUp);
    document.addEventListener('mouseup',onUp);
  });
}
function wfHL(){
  var g=document.getElementById('wfgrid');if(!g)return;
  g.querySelectorAll('.wfc:not(.found)').forEach(function(c){c.classList.remove('sel');});
  _wfSel.forEach(function(i){var c=g.querySelector('[data-i="'+i+'"]');if(c&&!c.classList.contains('found'))c.classList.add('sel');});
}

function showGO(){
  if(!L)return;
  var mH='';
  if(L.mistakes.length){
    mH='<div class="mlist">';
    L.mistakes.slice(0,8).forEach(function(w){
      mH+='<div class="mrow"><span class="mit" data-spk="'+w.en+'">'+w.en+'</span><span>'+w.tr+'</span></div>';
    });
    mH+='</div>';
  } else {
    mH='<div style="background:var(--s2);border-radius:9px;padding:13px;text-align:center;color:var(--t3);font-size:13px;margin-bottom:14px">No specific word mistakes.</div>';
  }
  document.getElementById('s-go').innerHTML='<div class="go-card">'
    +'<div class="go-ic">&#128148;</div>'
    +'<div class="go-ttl">Out of Hearts!</div>'
    +'<div class="go-sub">Review these words and try again:</div>'
    +mH
    +'<div class="go-btns">'
    +'<button class="go-b retry" id="go-retry">&#128260; Try Again</button>'
    +'<button class="go-b home" id="go-home">&#127968; Main Menu</button>'
    +'</div></div>';
  document.getElementById('go-retry').addEventListener('click',function(){startLesson(L.uid);});
  document.getElementById('go-home').addEventListener('click',showHome);
  document.getElementById('s-go').querySelectorAll('[data-spk]').forEach(function(el){
    el.addEventListener('click',function(){speak(el.dataset.spk);});
  });
  showScr('go');
}

function showComplete(){
  if(!L)return;
  var total=L.correct+(L.mistakes.length||0);
  var acc=total>0?Math.round(L.correct/total*100):100;
  S.xp+=L.xp;S.words+=L.unit.w.length;
  if(S.done.indexOf(L.uid)===-1)S.done.push(L.uid);
  S.prog[L.uid]=100;S.streak++;saveS();
  var ni=0;for(var i=0;i<UNITS.length;i++){if(UNITS[i].id===L.uid){ni=i+1;break;}}
  var nxt=UNITS[ni]||null;
  var rows='';
  L.unit.w.map(mkW).forEach(function(w){
    rows+='<div class="cp-row">'
      +'<span class="cp-en" data-spk="'+w.en+'">'+w.en+'</span>'
      +'<span style="color:var(--t2)">'+w.tr+'</span>'
      +'<button class="lbtn" data-spk="'+w.en+'" style="margin:0;padding:2px 7px;font-size:11px">&#128266;</button>'
      +'</div>';
  });
  document.getElementById('s-cp').innerHTML='<div class="cp-card">'
    +'<div class="cp-tr">&#127942;</div>'
    +'<div class="cp-ttl">WELL DONE!</div>'
    +'<div style="color:var(--t2);font-size:13px;margin-top:4px">'+L.unit.label+' &middot; Complete!</div>'
    +'<div class="cp-stats">'
    +'<div class="cps"><div class="v">'+L.xp+'</div><div class="l">XP</div></div>'
    +'<div class="cps"><div class="v">'+acc+'%</div><div class="l">Accuracy</div></div>'
    +'<div class="cps"><div class="v">'+L.unit.w.length+'</div><div class="l">Words</div></div>'
    +'<div class="cps"><div class="v">'+L.exs.length+'</div><div class="l">Exercises</div></div>'
    +'</div>'
    +'<div class="cp-voc"><div class="cp-vh">Words in this lesson</div>'+rows+'</div>'
    +'<div class="cp-btns">'
    +'<button class="cp-btn home" id="cp-home">&#127968; Home</button>'
    +(nxt?'<button class="cp-btn next" id="cp-next">&#9654; '+nxt.label+'</button>':'<button class="cp-btn next" id="cp-next">&#127881; All Done!</button>')
    +'</div></div>';
  document.getElementById('cp-home').addEventListener('click',showHome);
  document.getElementById('cp-next').addEventListener('click',function(){nxt?startLesson(nxt.id):showHome();});
  document.getElementById('s-cp').querySelectorAll('[data-spk]').forEach(function(el){
    el.addEventListener('click',function(){speak(el.dataset.spk);});
  });
  showScr('cp');
}

// ── INIT ──
if(window.innerWidth<768){
  document.addEventListener('DOMContentLoaded',function(){
    var sb=document.getElementById('sb');
    var btn=document.getElementById('sb-toggle');
    if(sb)sb.classList.add('collapsed');
    if(btn){btn.innerHTML='&#9776;';btn.style.left='12px';}
  });
}
showHome();

</script>
